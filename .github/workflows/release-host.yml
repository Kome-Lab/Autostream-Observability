name: Host Release

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.2.3"
        required: true
        type: string
      push_release:
        description: "Attach artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  release-host:
    name: Build Linux host artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      push_release: ${{ steps.meta.outputs.push_release }}
    env:
      SERVICE_NAME: observability
      ARTIFACT_PREFIX: autostream-observability
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUSH_RELEASE: ${{ inputs.push_release }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            push_release="true"
          else
            version="${INPUT_VERSION}"
            push_release="${INPUT_PUSH_RELEASE}"
          fi
          if [[ "${version}" =~ ^v\. ]]; then
            echo "Version must look like v1.2.3, not ${version}. Remove the dot after v." >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v1.2.3; got ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "push_release=${push_release}" >> "${GITHUB_OUTPUT}"

      - name: Test
        run: go test ./...

      - name: Test backup script with root-owned Linux fixtures
        run: |
          docker run --rm \
            --user 0:0 \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --memory 256m \
            --cpus 1 \
            --mount "type=bind,source=${GITHUB_WORKSPACE},target=/workspace,readonly" \
            ubuntu@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90 \
            /bin/bash /workspace/internal/security/testdata/run-backup-script-root-smoke.sh \
              /workspace/release/autostream-backup-observability.example \
              /var/backups/autostream/observability \
              autostream_observability \
              autostream-kometubu_o11y

      - name: Package linux artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          rm -rf staging artifacts
          mkdir -p staging artifacts
          for arch in amd64 arm64; do
            artifact="${ARTIFACT_PREFIX}_${version}_linux_${arch}"
            root="staging/${artifact}"
            mkdir -p "${root}/backup" "${root}/bin" "${root}/systemd"
            build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            ldflags="-s -w -X github.com/example/autostream-observability/internal/version.Version=${version} -X github.com/example/autostream-observability/internal/version.Commit=${GITHUB_SHA} -X github.com/example/autostream-observability/internal/version.BuildDate=${build_date}"
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -ldflags="${ldflags}" -o "${root}/bin/${ARTIFACT_PREFIX}" ./cmd/observability
            cp "${root}/bin/${ARTIFACT_PREFIX}" "${root}/bin/${SERVICE_NAME}"
            cp .env.example "${root}/.env.example"
            cp systemd/*.service.example "${root}/systemd/"
            cp release/autostream-backup-observability.example "${root}/backup/autostream-backup-observability"
            chmod 0755 "${root}/backup/autostream-backup-observability"
            cp release/README.install.md "${root}/README.install.md"
            (cd "${root}" && find . -type f ! -path './checksums.txt' -print0 | sort -z | xargs -0 sha256sum > checksums.txt)
            tar -C staging -czf "artifacts/${artifact}.tar.gz" "${artifact}"
            (cd artifacts && sha256sum "${artifact}.tar.gz" > "${artifact}.tar.gz.sha256")
            checksum_path="artifacts/${artifact}.tar.gz.sha256"
            test "$(wc -l < "${checksum_path}")" -eq 1
            LC_ALL=C grep -Eq '^[0-9a-f]{64}  [^/[:space:]]+$' "${checksum_path}"
            test "$(awk 'NR == 1 { print $2 }' "${checksum_path}")" = "${artifact}.tar.gz"
          done

      - name: Create host release manifest
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_SERVICE: observability
          DATABASE_SCHEMA: backward_compatible
        run: |
          set -euo pipefail
          release_artifacts='[]'
          for arch in amd64 arm64; do
            name="${ARTIFACT_PREFIX}_${RELEASE_VERSION}_linux_${arch}.tar.gz"
            path="artifacts/${name}"
            checksum_path="${path}.sha256"
            test -f "${path}"
            test -f "${checksum_path}"
            declared_sha="$(awk 'NR == 1 { print $1 }' "${checksum_path}")"
            declared_name="$(awk 'NR == 1 { print $2 }' "${checksum_path}")"
            actual_sha="$(sha256sum "${path}" | awk '{ print $1 }')"
            if [[ "$(wc -l < "${checksum_path}")" -ne 1 ]] || ! LC_ALL=C grep -Eq '^[0-9a-f]{64}  [^/[:space:]]+$' "${checksum_path}"; then
              echo "Checksum file ${checksum_path} has an invalid format" >&2
              exit 1
            fi
            if [[ ! "${declared_sha}" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Invalid SHA-256 in ${checksum_path}" >&2
              exit 1
            fi
            if [[ "${declared_name}" != "${name}" ]]; then
              echo "Checksum file ${checksum_path} names ${declared_name}, expected ${name}" >&2
              exit 1
            fi
            if [[ "${declared_sha}" != "${actual_sha}" ]]; then
              echo "Checksum mismatch for ${name}" >&2
              exit 1
            fi
            (cd artifacts && sha256sum --check --strict "${name}.sha256")
            size="$(stat -c %s "${path}")"
            release_artifacts="$(
              jq -c \
                --arg arch "${arch}" \
                --arg name "${name}" \
                --arg sha256 "${actual_sha}" \
                --argjson size "${size}" \
                '. + [{os: "linux", arch: $arch, name: $name, size: $size, sha256: $sha256}]' \
                <<< "${release_artifacts}"
            )"
          done

          jq -n \
            --arg release_id "${RELEASE_VERSION}" \
            --arg published_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg service "${RELEASE_SERVICE}" \
            --arg source_version "${RELEASE_VERSION}" \
            --arg commit "${GITHUB_SHA}" \
            --arg database_schema "${DATABASE_SCHEMA}" \
            --argjson artifacts "${release_artifacts}" \
            '{
              schema_version: 1,
              release_id: $release_id,
              channel: "host",
              published_at: $published_at,
              minimum_agent_version: "v1.0.0",
              components: [{
                service: $service,
                source_version: $source_version,
                commit: $commit,
                artifacts: $artifacts,
                rollback_compatible: true,
                database_schema: $database_schema
              }]
            }' > artifacts/release-manifest.json

          jq -e \
            --arg version "${RELEASE_VERSION}" \
            --arg service "${RELEASE_SERVICE}" \
            --arg commit "${GITHUB_SHA}" \
            --arg database_schema "${DATABASE_SCHEMA}" \
            '(.schema_version == 1) and
             (.release_id == $version) and
             (.channel == "host") and
             (.published_at | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$")) and
             (.minimum_agent_version == "v1.0.0") and
             (.components | length == 1) and
             (.components[0].service == $service) and
             (.components[0].source_version == $version) and
             (.components[0].commit == $commit) and
             (.components[0].rollback_compatible == true) and
             (.components[0].database_schema == $database_schema) and
             (.components[0].artifacts | length == 2) and
             (all(.components[0].artifacts[];
               .os == "linux" and
               (.arch == "amd64" or .arch == "arm64") and
               (.name | type == "string") and
               (.size | type == "number" and . > 0) and
               (.sha256 | test("^[0-9a-f]{64}$"))))' \
            artifacts/release-manifest.json > /dev/null

          (cd artifacts && sha256sum release-manifest.json > release-manifest.json.sha256)
          if [[ "$(wc -l < artifacts/release-manifest.json.sha256)" != "1" ]]; then
            echo "release-manifest.json.sha256 must contain exactly one line" >&2
            exit 1
          fi
          if ! LC_ALL=C grep -Eq '^[0-9a-f]{64}  release-manifest\.json$' artifacts/release-manifest.json.sha256; then
            echo "release-manifest.json.sha256 has an invalid format" >&2
            exit 1
          fi
          (cd artifacts && sha256sum --check --strict release-manifest.json.sha256)

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: host-release-dry-run
          path: artifacts/*

  publish-release:
    name: Publish GitHub Release
    needs: release-host
    if: needs.release-host.outputs.push_release == 'true'
    runs-on: ubuntu-24.04
    concurrency:
      group: host-release-publish-${{ needs.release-host.outputs.version }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: host-release-dry-run
          path: artifacts

      - name: Validate immutable release namespace
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release-host.outputs.version }}
        run: |
          set -euo pipefail

          releases_json="${RUNNER_TEMP}/host-release-pages.json"
          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > "${releases_json}"
          existing_release_count="$(
            jq -s --arg tag "${RELEASE_VERSION}" \
              '[.[][] | select(.tag_name == $tag)] | length' \
              "${releases_json}"
          )"
          if [[ "${existing_release_count}" != "0" ]]; then
            echo "Release ${RELEASE_VERSION} already exists (including drafts); refusing to modify it." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${RELEASE_VERSION}" ]]; then
              echo "Triggered tag ${GITHUB_REF_NAME} does not match ${RELEASE_VERSION}." >&2
              exit 1
            fi

            tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_VERSION}")"
            ref_type="$(jq -r '.object.type' <<< "${tag_ref}")"
            ref_sha="$(jq -r '.object.sha' <<< "${tag_ref}")"
            depth=0
            while [[ "${ref_type}" == "tag" ]]; do
              depth=$((depth + 1))
              if (( depth > 8 )); then
                echo "Annotated tag ${RELEASE_VERSION} exceeds the dereference limit." >&2
                exit 1
              fi
              tag_object="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${ref_sha}")"
              ref_type="$(jq -r '.object.type' <<< "${tag_object}")"
              ref_sha="$(jq -r '.object.sha' <<< "${tag_object}")"
            done
            if [[ "${ref_type}" != "commit" || "${ref_sha}" != "${GITHUB_SHA}" ]]; then
              echo "Tag ${RELEASE_VERSION} does not resolve to workflow commit ${GITHUB_SHA}." >&2
              exit 1
            fi
          else
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_VERSION}" > "${RUNNER_TEMP}/existing-tag.json" 2> "${RUNNER_TEMP}/existing-tag.err"; then
              echo "Tag ${RELEASE_VERSION} already exists; workflow_dispatch may not overwrite or reuse it." >&2
              exit 1
            elif ! grep -q 'HTTP 404' "${RUNNER_TEMP}/existing-tag.err"; then
              cat "${RUNNER_TEMP}/existing-tag.err" >&2
              exit 1
            fi
          fi

      - name: Bind workflow-dispatch tag to build commit
        if: github.ref_type != 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release-host.outputs.version }}
        run: |
          set -euo pipefail

          created_ref="$(
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_VERSION}" \
              -f sha="${GITHUB_SHA}"
          )"
          if ! jq -e \
            --arg ref "refs/tags/${RELEASE_VERSION}" \
            --arg commit "${GITHUB_SHA}" \
            '(.ref == $ref) and (.object.type == "commit") and (.object.sha == $commit)' \
            <<< "${created_ref}" > /dev/null; then
            echo "GitHub returned an unexpected ref after creating tag ${RELEASE_VERSION}." >&2
            exit 1
          fi

          tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_VERSION}")"
          ref_type="$(jq -r '.object.type' <<< "${tag_ref}")"
          ref_sha="$(jq -r '.object.sha' <<< "${tag_ref}")"
          depth=0
          while [[ "${ref_type}" == "tag" ]]; do
            depth=$((depth + 1))
            if (( depth > 8 )); then
              echo "Created tag ${RELEASE_VERSION} exceeds the dereference limit." >&2
              exit 1
            fi
            tag_object="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${ref_sha}")"
            ref_type="$(jq -r '.object.type' <<< "${tag_object}")"
            ref_sha="$(jq -r '.object.sha' <<< "${tag_object}")"
          done
          if [[ "${ref_type}" != "commit" || "${ref_sha}" != "${GITHUB_SHA}" ]]; then
            echo "Created tag ${RELEASE_VERSION} does not resolve to workflow commit ${GITHUB_SHA}." >&2
            exit 1
          fi

      - name: Attest release manifest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: artifacts/release-manifest.json
          create-storage-record: false

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          tag_name: ${{ needs.release-host.outputs.version }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: artifacts/*
          overwrite_files: false

      - name: Verify published release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release-host.outputs.version }}
        run: |
          set -euo pipefail

          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_VERSION}")"
          if ! jq -e \
            --arg tag "${RELEASE_VERSION}" \
            '(.tag_name == $tag) and (.draft == false) and (.published_at | type == "string" and length > 0)' \
            <<< "${release_json}" > /dev/null; then
            echo "Release ${RELEASE_VERSION} is not a published final release." >&2
            exit 1
          fi

          tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_VERSION}")"
          ref_type="$(jq -r '.object.type' <<< "${tag_ref}")"
          ref_sha="$(jq -r '.object.sha' <<< "${tag_ref}")"
          depth=0
          while [[ "${ref_type}" == "tag" ]]; do
            depth=$((depth + 1))
            if (( depth > 8 )); then
              echo "Published tag ${RELEASE_VERSION} exceeds the dereference limit." >&2
              exit 1
            fi
            tag_object="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${ref_sha}")"
            ref_type="$(jq -r '.object.type' <<< "${tag_object}")"
            ref_sha="$(jq -r '.object.sha' <<< "${tag_object}")"
          done
          if [[ "${ref_type}" != "commit" || "${ref_sha}" != "${GITHUB_SHA}" ]]; then
            echo "Published tag ${RELEASE_VERSION} does not resolve to workflow commit ${GITHUB_SHA}." >&2
            exit 1
          fi
