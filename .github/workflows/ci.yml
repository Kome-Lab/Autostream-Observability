name: autostream-observability CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_DATABASE: autostream_observability
          MARIADB_USER: autostream
          MARIADB_PASSWORD: autostream_password
          MARIADB_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.mod
      - run: go test ./internal/store -run TestMariaDBNotificationChannelIntegrationStoresSecretsAsCiphertextAndNonce -count=1
        env:
          AUTOSTREAM_OBSERVABILITY_TEST_DATABASE_URL: autostream:autostream_password@tcp(127.0.0.1:3306)/autostream_observability?parseTime=true
      - run: go test ./...
      - run: go build ./...
