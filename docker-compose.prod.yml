services:
  observability:
    image: ${AUTOSTREAM_IMAGE_REGISTRY:-ghcr.io/kome-lab/autostream-docker}/observability:${AUTOSTREAM_DOCKER_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      AUTOSTREAM_NODE_CONFIG: /etc/autostream-observability/config.yml
      OBSERVABILITY_BIND_ADDR: 0.0.0.0:8080
    ports: !override
      - "127.0.0.1:8082:8080"
    volumes:
      - ${OBSERVABILITY_NODE_CONFIG_PATH:-./config/config.yml}:/etc/autostream-observability/config.yml:ro
