services:
  observability:
    environment:
      AUTOSTREAM_NODE_CONFIG: /etc/autostream-observability/config.yml
      SERVICE_VERSION: 0.1.0-local
      CONTROL_PANEL_HEARTBEAT_INTERVAL_SEC: 5
      AUTOSTREAM_SECRET_ENCRYPTION_KEY: dev-only-observability-secret-encryption-key
      NOTIFICATION_WEBHOOK_TYPE: generic
      NOTIFICATION_WEBHOOK_URL: ""
      REMEDIATION_MODE: suggest_only
      OBSERVABILITY_BIND_ADDR: 0.0.0.0:8080
      DATABASE_URL: mysql://autostream:example_password_change_me@tcp(mariadb:3306)/autostream_observability?parseTime=true
      TZ: Asia/Tokyo
    ports: !override
      - "8082:8080"
    volumes: !override
      - ./config/config.yml:/etc/autostream-observability/config.yml:ro
